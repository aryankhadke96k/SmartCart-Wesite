<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Account</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="container">
        <div class="header-main">

            <div class="brand">
                <h2>SmartCart</h2>
                <span>Shop Smart. Live Better.</span>
            </div>

            <div class="search-bar">
                <input type="text" placeholder="Search products...">
                <button><i class="bi bi-search"></i></button>
            </div>

            <div class="nav-icons">
                
                <a href="login.html"><i class="bi bi-box-arrow-in-right"></i></a>
                 <a href="orders.html" title="Orders">
                         <i class="bi bi-bag-check"></i>
                      </a>
                <a href="cart.html"><i class="bi bi-cart3"></i></a>
                <a href="profile.html"><i class="bi bi-person"></i></a>
            </div>

        </div>
    </div>
</header>


<nav class="navbar navbar-expand-lg navbar-dark main-nav">
    <div class="container">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="product.html">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="deal.html">Deals</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="about.html">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>

            </ul>
        </div>

    </div>
</nav>


<div class="topbar">My Account</div>


<div class="wrapper">

  
    <div class="sidebar">

        <div class="user-box text-center">
            <div class="avatar" id="avatar"></div>
            <h6 id="name"></h6>
            <small id="email"></small>
        </div>

        <div class="menu">
            <a href="orders.html">📦 My Orders</a>
            <a href="#">❤️ Wishlist</a>
        
            <a href="#" onclick="logout()">🚪 Logout</a>
        </div>

    </div>

<script>
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
    window.location.href = "login.html";
}

document.getElementById("name").innerText = user.name;
document.getElementById("email").innerText = user.email;
document.getElementById("avatar").innerText = user.name.charAt(0).toUpperCase();

function logout(){
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>
<script src="script.js"></script>
</body>
</html>
