<div class="checkout-container">

<h2>Checkout</h2>

<div class="product-box" id="product"></div>


<form onsubmit="placeOrder(event)">
        
        <label>Full Name</label>
        <input type="text" required>
        
        <label>Email Address</label>
        <input type="email" required>
        
        <label>Phone Number</label>
        <input type="tel" required>
        
        <label>Full Address</label>
        <textarea rows="3" required></textarea>
        
        <label>Payment Method</label>
        <select required>
             <option value="">Select Payment Method</option>
             <option>Cash on Delivery</option>
             <option>UPI (PhonePe / GPay)</option>
             <option>Credit / Debit Card</option>
        </select>

<button class="btn-gold">Place Order</button>

</form>

</div>

<script>
// load product
let item = JSON.parse(localStorage.getItem("buyItem"));

document.getElementById("product").innerHTML = `
    <h5>${item.name}</h5>
    <p>Price: ₹${item.price}</p>
`;

// order function
function placeOrder(e){
    e.preventDefault();

    alert("🎉 Order Placed Successfully!\nWe will contact you soon.");

    localStorage.removeItem("buyItem");

    window.location.href = "profile.html";
}
</script>
